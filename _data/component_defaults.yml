# Component Defaults Configuration
# Centralizes default values for component parameters to eliminate
# scattered {% assign param = include.param | default: value %} patterns

# =============================================================================
# CARD COMPONENTS
# =============================================================================

cards:
  # Entry Card (journal posts, insights, articles)
  entry-card:
    image_base_path: "/assets/images/journal/"
    image_size: "400w"
    show_author: true
    show_date: true
    show_tags: true
    show_excerpt: true
    excerpt_words: 25
    tag_limit: 3
    read_more_text: null  # Will use translation helper

  # Brand Card
  brand-card:
    show_founder: true
    show_location: true
    show_sector: true
    show_attributes: true
    show_featured_badge: true
    layout: "vertical"
    tag_limit: 4
    image_aspect_ratio: "3:2"

  # Hero Brand Card
  hero-brand-card:
    show_founder: true
    show_location: true
    show_markets: true
    show_sectors: true
    show_attributes: true
    show_signals: true
    show_logo: true
    show_hero_image: true
    tag_limit: 6

  # Insight Card
  insight-card:
    show_category: true
    show_author: true
    show_date: true
    show_reading_time: true
    excerpt_words: 25
    image_fallback: true

  # Founder Card
  founder-card:
    show_company: true
    show_brands: true
    show_expertise: true
    show_generation: true
    show_location: true
    image_aspect_ratio: "2:3"

  # Founder Quote Card
  founder-quote-card:
    style: "inline"
    show_context: true
    show_attribution: true
    show_type_badge: true

  # Author Card
  author-card:
    layout: "standard"
    show_highlights: true
    show_bio: true
    bio_words: 120

  # Dimension Card
  dimension-card:
    limit: 3
    tag_selection: "featured"
    tag_sort: "none"
    show_count: true

  # Featured Brand Card
  featured-brand-card:
    tag_limit: 2
    description_words: 180
    show_featured_badge: true
    layout: "horizontal"
    image_aspect_ratio: "3:2"

  # Featured Founder Card
  featured-founder-card:
    bio_words: 120
    tag_limit: 4
    show_achievement: true
    show_generation: true
    image_aspect_ratio: "2:3"

  # Featured Insight Card
  featured-insight-card:
    excerpt_words: 120
    show_category: true
    show_date: true
    show_author: true
    image_aspect_ratio: "3:2"

  # Related Brand Card
  related-brand-card:
    description_words: 100
    show_sector: true
    show_location: true
    tag_limit: 2

  # Simple Insight Card
  simple-insight-card:
    excerpt_words: 150
    show_date: true
    show_category: false
    layout: "minimal"

  # Tagged Insight Card
  tagged-insight-card:
    excerpt_words: 120
    show_tags: true
    tag_limit: 3
    show_category: true

  # Team Member Card
  team-member-card:
    show_role: true
    show_bio: true
    bio_words: 80
    image_aspect_ratio: "1:1"

  # Testimonial Card
  testimonial-card:
    show_attribution: true
    show_company: true
    quote_words: 200
    layout: "standard"

  # Case Study Card
  case-study-card:
    show_client: true
    show_industry: true
    show_metrics: true
    excerpt_words: 30
    image_aspect_ratio: "3:2"
    tag_limit: 2

  # Universal Card - Primary Configuration (THE UNIVERSAL SYSTEM)
  universal-card:
    # Brand configuration with sophisticated features
    brand:
      layout_variant: "full-hero-with-overlay"
      description_words: 25
      quote_words: 40
      tag_limit: 4
      show_metric_overlay: true
      show_logo_corner: true
      show_founder_quote: true
      enable_split_footer: true
    
    # Insight configuration with category styling
    insight:
      layout_variant: "full-hero-with-category"
      excerpt_words: 25
      description_words: 25
      tag_limit: 3
      show_category_border: true
      show_icon_badge: true
      show_reading_time: true
      show_tags: true
    
    # Founder configuration with generation badges
    founder:
      layout_variant: "portrait-focus"
      bio_words: 30
      quote_words: 40
      expertise_limit: 3
      language_limit: 2
      show_generation_badge: true
      show_achievement_highlight: true
      show_skill_cloud: true
    
    # Testimonial configuration with quote emphasis
    testimonial:
      layout_variant: "quote-focus"
      quote_words: 200
      show_quote_emphasis: true
      show_attribution: true
      show_impact_grid: true
    
    # Case study configuration with large metrics
    case-study:
      layout_variant: "professional-metrics"
      description_words: 20
      metrics_limit: 2
      show_timeline: true
      show_large_metrics: true
      show_professional_styling: true
    
    # Dimension configuration with icon systems
    dimension:
      layout_variant: "icon-system"
      description_words: 15
      show_color_coding: true
      show_icon_badge: true
      show_count_indicator: true
    
    # Entry configuration for journal/blog posts
    entry:
      layout_variant: "standard-article"
      excerpt_words: 25
      description_words: 25
      tag_limit: 3
      show_date: true
      show_author: true
      show_reading_time: true
      show_tags: true
    
    # Team member configuration
    team-member:
      layout_variant: "professional-profile"
      bio_words: 80
      show_role: true
      show_portrait: true
      show_skills: true
      show_social_links: true

  # Universal Card v2.0 Configuration (Legacy - maintained for compatibility)
  universal-card-v2:
    # Global defaults
    default:
      variant: "standard"
      context: "carousel"
      show_image: true
      show_taxonomy: true
      show_actions: true
      
    # Type-specific configurations
    brand:
      excerpt_words: 25
      taxonomy_limit: 4
      taxonomy_types: ["sectors", "markets", "attributes"]
      show_founding_year: true
      show_location: true
      
    founder:
      bio_words: 30
      expertise_limit: 3
      language_limit: 2
      show_company: true
      show_generation: true
      
    case-study:
      description_words: 20
      metrics_limit: 2
      show_industry: true
      show_duration: true
      
    insight:
      excerpt_words: 25
      show_category: true
      show_date: true
      show_reading_time: true

  # Universal Content Card (Enhanced v2.1) - Phase II
  universal-content-card:
    default:
      variant: "standard"
      context: "grid"
      show_image: true
      show_taxonomy: true
      show_actions: true
      
    brand:
      description_words: 25
      taxonomy_limit: 4
      taxonomy_types: ["sectors", "markets", "attributes"]
      show_founding_year: true
      show_location: true
      
    founder:
      bio_words: 30
      taxonomy_limit: 3
      show_company: true
      show_generation: true
      show_position: true
      
    case-study:
      description_words: 20
      metrics_limit: 2
      show_industry: true
      show_duration: true
      show_client: true
      
    insight:
      excerpt_words: 25
      tag_limit: 3
      show_category: true
      show_date: true
      show_reading_time: true
      
    entry:
      excerpt_words: 20
      tag_limit: 4
      show_author: true
      show_date: true
      
    team-member:
      bio_words: 20
      skills_limit: 4
      show_social: true
      show_role: true
      show_department: true

  # PHASE 1 ENHANCEMENT: Sophisticated Universal Card Configurations
  # Enhanced configurations for wireframe-level sophistication
  universal-card-enhanced:
    # Global sophisticated defaults
    default:
      variant: "standard"
      context: "grid"
      show_image: true
      show_taxonomy: true
      show_actions: true
      enable_overlays: false
      enable_split_footer: false
      
    # BRAND CARDS - 10 sections, complexity 9/10
    brand:
      # Layout configuration
      layout_variant: "full-hero-with-overlay"
      sections:
        header:
          show_hero_image: true
          show_metric_overlay: true      # "23 Countries" badge
          show_logo_corner: true         # Bottom-right logo placement
        content:
          show_title: true
          show_founded_location: true    # "Founded 1998 • Moscow 🇷🇺"  
          show_description: true
          description_words: 25
        quote:
          show_founder_quote: true
          quote_style: "with-attribution" # Multi-line with name/title
          quote_words: 40
        achievement:
          show_success_highlight: true
          achievement_style: "highlight-box-with-icon" # ⚡ icon
        taxonomy:
          show_primary_tags: true
          show_signal_tags: true
          taxonomy_limit: 4
          taxonomy_types: ["sectors", "markets", "attributes"]
        footer:
          layout: "split"                # CTA left, signal tags right
          show_cta: true
          show_signal_tags: true
      # CSS generation
      css_modifiers: ["brand", "overlay-metrics", "split-footer", "quote-attribution"]
      enable_overlays: true
      enable_split_footer: true

    # INSIGHT CARDS - 8 sections, complexity 8/10  
    insight:
      # Layout configuration
      layout_variant: "full-hero-with-category"
      sections:
        header:
          show_hero_image: true
          show_category_badge: true      # Top-left overlay with icon
        content:
          show_title: true
          show_meta_info: true           # Date + reading time
          show_description: true
          excerpt_words: 25
        tags:
          show_primary_tags: true        # Market/sector tags
          show_signal_tags: true         # Separate tier
          tag_layout: "two-tier"
          tag_limit: 3
        footer:
          show_cta: true
      # CSS generation  
      css_modifiers: ["insight", "category-border", "two-tier-tags", "category-badge"]
      enable_category_borders: true
      enable_two_tier_tags: true

    # FOUNDER CARDS - 10 sections, complexity 7/10
    founder:
      # Layout configuration
      layout_variant: "portrait-focus"
      sections:
        header:
          show_portrait: true            # Instead of hero image
          show_generation_badge: true    # 1st Gen, 3rd Gen
        content:
          show_name: true
          show_location: true
          show_associated_brand: true
          show_biography: true
          bio_words: 30
        achievement:
          show_key_achievement: true     # Specific achievement callout
        meta:
          show_languages: true           # Language skills display
          show_position: true
          show_company: true
        tags:
          show_expertise_tags: true      # Skill cloud
          tag_layout: "skill-cloud"
          taxonomy_limit: 3
        footer:
          show_cta: true
      # CSS generation
      css_modifiers: ["founder", "portrait-focus", "skill-cloud", "generation-badge"]
      enable_portrait_focus: true
      enable_generation_badges: true

    # CASE STUDY CARDS - 8 sections, complexity 8/10
    case-study:
      # Layout configuration
      layout_variant: "metrics-emphasis" 
      sections:
        header:
          show_hero_image: true
        content:
          show_client_label: true        # "CLIENT"
          show_company_name: true
          show_case_title: true
          show_description: true
          show_timeline: true            # Duration: X years (YYYY-YYYY)
          description_words: 20
        metrics:
          show_large_metrics: true       # $400M+ style display
          metrics_style: "large-display"
          metrics_limit: 2
        quote:
          show_founder_quote: true       # Client/founder quotes
          quote_style: "emphasis"
        footer:
          show_cta: true
      # CSS generation
      css_modifiers: ["case-study", "metrics-emphasis", "large-display"]
      enable_large_metrics: true
      enable_timeline_display: true

    # TESTIMONIAL CARDS - 6 sections, complexity 7/10
    testimonial:
      # Layout configuration
      layout_variant: "quote-emphasis"
      sections:
        quote:
          show_large_quote: true         # Large quote emphasis area
          quote_words: 30
        profile:
          show_profile_image: true       # Small profile image
          show_name: true
          show_role_company: true
        metrics:
          show_impact_metrics: true      # 2x2 grid format
          metrics_style: "impact-grid"   # 4/65% style layout
          metrics_limit: 4
        footer:
          show_cta: false                # Testimonials typically don't have CTAs
      # CSS generation
      css_modifiers: ["testimonial", "quote-emphasis", "impact-grid"]
      enable_quote_emphasis: true
      enable_impact_grid: true

    # DIMENSION CARDS - 4 sections, complexity 4/10
    dimension:
      # Layout configuration
      layout_variant: "simple"
      sections:
        header:
          show_icon: true                # Dimension-specific icons
          show_title: true
        content:
          show_description: true
          show_count_indicator: true     # "+X more"
          description_words: 15
        footer:
          show_cta: true
      # CSS generation
      css_modifiers: ["dimension", "color-coded", "icon-header"]
      enable_color_coding: true
      enable_icons: true

  # Universal Utility Card
  universal-utility-card:
    default:
      variant: "standard"
      layout: "vertical"
      
    dimension:
      show_count: true
      description_words: 15
      
    testimonial:
      quote_words: 30
      show_company: true
      show_role: true
      
    metric:
      show_change: true
      highlight_positive: true
      
    social-link:
      show_handle: true
      
    quote:
      quote_words: 25
      show_context: true
      
    stat:
      show_trend: true
      show_description: true

  # Universal Hero Card
  universal-hero-card:
    default:
      layout: "split"
      features: ["image", "content", "taxonomy", "action"]
      
    brand:
      description_words: 50
      taxonomy_limit: 6
      show_location: true
      show_founding_year: true
      
    founder:
      bio_words: 50
      taxonomy_limit: 4
      show_achievements: true
      show_generation: true
      
    case-study:
      description_words: 40
      show_metrics: true
      show_client: true
      show_industry: true
      
    insight:
      excerpt_words: 50
      tag_limit: 5
      show_author: true
      show_category: true
      show_reading_time: true
      
    entry:
      excerpt_words: 45
      show_author: true
      show_date: true

    # AUTHOR CARDS - 5 sections, journal profile focus
    author:
      # Layout configuration
      layout_variant: "journal-profile"
      sections:
        header:
          show_portrait: true
          show_name: true
        content:
          show_role: true
          show_bio: true
          bio_words: 120
        highlights:
          show_highlights: true
          highlights_limit: 5
        meta:
          show_attribution: true
        social:
          show_linkedin: true
          show_social_links: true
        footer:
          show_journal_link: false
      # CSS generation
      css_modifiers: ["author", "journal-profile", "circular-portrait"]
      enable_portrait_focus: true
      enable_social_links: true



# =============================================================================
# FORM COMPONENTS
# =============================================================================

forms:
  # Basic Contact Form
  form:
    action: "#"
    method: "post"
    name_label: "Name"
    email_label: "Email"
    message_label: "Message"
    submit_label: "Send Message"
    required_fields: ["name", "email", "message"]

  # Newsletter Form
  newsletter:
    variant: "default"
    show_name: false
    submit_text: "Subscribe"
    show_privacy_notice: true
    placeholder_text: null  # Will use translation helper
    form_title: null  # Will use translation helper
    form_description: null  # Will use translation helper

  # Custom Contact Form
  contact:
    show_phone: false
    show_company: false
    show_subject: true
    success_redirect: null
    error_message: null  # Will use translation helper

  # Validation
  validation:
    email_pattern: "^[^@]+@[^@]+\\.[^@]+$"
    required_message_key: "forms.validation.required"
    email_message_key: "forms.validation.email"
    min_length_message_key: "forms.validation.min_length"

  # Contact Form (Enhanced)
  contact-form:
    enable_validation: true
    show_labels: true
    required_fields: ["name", "email", "message"]
    show_phone: false
    show_company: false
    show_subject: true
    success_redirect: null
    error_message: null

  # Newsletter Form (Enhanced)
  newsletter-form:
    enable_validation: true
    placeholder_key: "forms.newsletter.placeholder"
    button_key: "forms.newsletter.submit"
    variant: "default"
    show_name: false
    show_privacy_notice: true

# =============================================================================
# NAVIGATION COMPONENTS
# =============================================================================

navigation:
  # Pagination
  pagination:
    max_pages: 10
    show_first_last: true
    show_prev_next: true
    current_page_label: null  # Will use translation helper
    previous_label: null  # Will use translation helper
    next_label: null  # Will use translation helper

  # Breadcrumbs
  breadcrumbs:
    show_home: true
    separator: "/"
    home_label: null  # Will use translation helper

# =============================================================================
# SEARCH COMPONENTS
# =============================================================================

search:
  # Simple Search
  simple-search:
    placeholder: null  # Will use translation helper
    button_text: null  # Will use translation helper
    min_chars: 3
    show_suggestions: true

  # Search Filter
  search-filter:
    debounce_delay: 300
    min_query_length: 3
    max_results: 100
    show_count: true
    enable_presets: true
    show_sort: true
    show_filters: true
    default_sort: "name"
    results_per_page: 12

  # Search Results
  search-results:
    items_per_page: 12
    layout: grid
    show_pagination: true

# =============================================================================
# IMAGE COMPONENTS
# =============================================================================

images:
  # Collection Image
  collection-image:
    loading: "lazy"
    sizes: "(max-width: 479px) 100vw, (max-width: 767px) 50vw, 33vw"
    aspect_ratio: "3:2"
    fallback_image: "/assets/images/fallbacks/default.jpg"

# =============================================================================
# UI COMPONENTS
# =============================================================================

ui:
  # Social Sharing
  social-sharing:
    style: "basic"
    layout: "horizontal"
    show_label: true
    icon_style: "svg"

  # Modal
  modal:
    closable: true
    backdrop_close: true
    show_close_button: true
    size: "medium"

  # Alert
  alert:
    dismissible: true
    show_icon: true
    auto_hide: false
    type: "info"

  # Loading Spinner
  loading:
    size: "medium"
    color: "primary"
    show_text: false

# =============================================================================
# DIMENSION COMPONENTS
# =============================================================================

dimensions:
  # Dimension Cloud
  dimension-cloud:
    max_tags: 20
    min_font_size: 14
    max_font_size: 24
    show_count: true
    layout: cloud

  # Dimension List
  dimension-list:
    show_description: true
    layout: vertical
    max_items: 50
    show_empty: false

  # Dimension Tag
  dimension-tag:
    show_icon: true
    style: pill
    clickable: true


# =============================================================================
# CASE STUDIES COMPONENTS
# =============================================================================

case-studies:
  # Case Study Hero
  case-study-hero:
    show_timeline: true
    show_client_info: true
    show_key_metrics: true
    layout: "split"

  # Case Study Metrics
  case-study-metrics:
    layout: "grid"
    show_icons: true
    highlight_primary: true
    max_metrics: 6

  # Case Study Quote
  case-study-quote:
    style: "pullout"
    show_portrait: true
    show_context: true
    layout: "standard"

# =============================================================================
# CAROUSEL COMPONENTS
# =============================================================================

carousels:
  # Universal Carousel - Base configuration for all carousels
  universal:
    # Responsive breakpoints
    cards_per_view_desktop: 3
    cards_per_view_tablet: 2
    cards_per_view_mobile: 1
    
    # Pagination settings
    show_dots: true
    show_arrows: true
    auto_advance: false
    
    # CSS classes (BEM methodology)
    container_class: "carousel"
    item_class: "carousel__item"
    dot_class: "carousel__dot"
    arrow_class: "carousel__arrow"
    
    # Behavior settings
    enable_touch: true
    enable_keyboard: true
    transition_duration: 300
    gap: "1.5rem"

  # Section-specific carousel configurations
  case-studies:
    cards_per_view_desktop: 3
    cards_per_view_tablet: 2
    cards_per_view_mobile: 1
    show_arrows: true
    show_dots: true
    
  featured-brands:
    cards_per_view_desktop: 2
    cards_per_view_tablet: 2
    cards_per_view_mobile: 1
    show_arrows: true
    show_dots: true
    
  founder-stories:
    cards_per_view_desktop: 3
    cards_per_view_tablet: 2
    cards_per_view_mobile: 1
    show_arrows: true
    show_dots: true

  # Legacy - Featured Case Studies Carousel (for backwards compatibility)
  featured-case-studies-carousel:
    max_items: 4
    show_metrics: true
    show_tags: true
    layout: "horizontal"
    auto_scroll: false
    scroll_speed: 5000
    show_navigation: true
    show_indicators: true
    cards_per_view_desktop: 3
    cards_per_view_tablet: 2
    cards_per_view_mobile: 1
    gap: "1.5rem"

# =============================================================================
# MAP COMPONENTS
# =============================================================================

maps:
  # Brand Map
  brand-map:
    zoom_level: 6
    cluster_radius: 50
    show_popup: true
    popup_fields: ["name", "sector", "location"]

